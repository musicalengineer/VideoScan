name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 15
    # Allow this job to push to the `metrics` branch (history.jsonl for the
    # trend dashboard). Scoped to contents only — no packages/actions/etc.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history? No — shallow is fine. But we DO need the token
          # persisted in git config so the later push step can auth.
          persist-credentials: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version
          system_profiler SPHardwareDataType | grep "Chip\|Memory"

      - name: Install SwiftLint & Periphery
        run: |
          brew install swiftlint periphery

      - name: SwiftLint (warn-only for now)
        # Non-blocking so we can ratchet down violations gradually.
        # To make this blocking, replace `|| true` with `--strict`.
        # Also captures raw Xcode-format output to a file so the metrics
        # collector can count warnings/errors.
        run: |
          echo "## SwiftLint Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          swiftlint lint --reporter emoji 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Raw output for metrics (Xcode reporter = one finding per line with ": warning:" / ": error:")
          swiftlint lint --reporter xcode > swiftlint-raw.txt 2>&1 || true
          echo "SWIFTLINT_OUTPUT=$(pwd)/swiftlint-raw.txt" >> $GITHUB_ENV

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project VideoScan/VideoScan.xcodeproj \
            -scheme VideoScan \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            2>&1 | tee xcodebuild-build.log
          if grep -q "BUILD FAILED" xcodebuild-build.log; then
            echo "::error::Build failed — see log above"
            grep 'error:' xcodebuild-build.log | head -20
            exit 1
          fi

      - name: Periphery — unused code report (non-blocking)
        # Periphery builds its own index internally, so no --skip-build.
        # Configuration lives in .periphery.yml.
        continue-on-error: true
        run: |
          echo "## Periphery — unused code" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          periphery scan 2>&1 | tee periphery-raw.txt | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "PERIPHERY_OUTPUT=$(pwd)/periphery-raw.txt" >> $GITHUB_ENV

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project VideoScan/VideoScan.xcodeproj \
            -scheme VideoScan \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:VideoScanTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            2>&1 | tee xcodebuild-test.log
          # Show summary
          grep -E "Test case|passed|failed|error:|BUILD|Testing failed" xcodebuild-test.log || true
          # Fail if tests failed
          if grep -q "Testing failed" xcodebuild-test.log; then
            echo "::error::Tests failed — see log above"
            grep -B5 "Testing failed" xcodebuild-test.log
            exit 1
          fi

      - name: Coverage Summary
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            echo "## Coverage by File" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            xcrun xccov view --report --files-for-target VideoScan.app TestResults.xcresult \
              | awk -F'  +' 'NR>2 && $3 != "" {printf "%-50s %s\n", $2, $3}' \
              >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(coverage data unavailable)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            echo ""
            echo "## Overall"
            xcrun xccov view --report --only-targets TestResults.xcresult 2>/dev/null || echo "(no coverage data)"
          else
            echo "No TestResults.xcresult found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

      # ---------------------------------------------------------------
      # Collect code-quality metrics and append to the `metrics` branch.
      #
      # We store history in a DEDICATED ORPHAN BRANCH (`metrics`) so the
      # main-branch history stays clean — the dashboard only appends,
      # never modifies source. The branch holds exactly one file:
      #   metrics/history.jsonl — one JSON row per CI run.
      #
      # First run auto-bootstraps the branch if it doesn't exist.
      # ---------------------------------------------------------------
      - name: Collect metrics + push to `metrics` branch
        if: always() && github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          # Run the collector against the CI workspace. It reads
          # TestResults.xcresult + $SWIFTLINT_OUTPUT + $PERIPHERY_OUTPUT
          # (env vars set by earlier steps) and writes ONE json line.
          chmod +x scripts/collect_metrics.sh
          ROW=$(scripts/collect_metrics.sh)
          echo "Metrics row:"
          echo "$ROW"

          # Set up a separate work dir so we don't disturb the main checkout.
          WORK=$(mktemp -d)
          cd "$WORK"

          # Clone only the metrics branch. If it doesn't exist, bootstrap it.
          git clone --branch metrics --single-branch --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" metrics-repo \
            2>/dev/null || {
              echo "metrics branch does not exist — bootstrapping"
              git clone --depth 1 \
                "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" metrics-repo
              cd metrics-repo
              git checkout --orphan metrics
              git rm -rf . 2>/dev/null || true
              mkdir -p metrics
              echo "# Metrics history" > README.md
              echo "One JSON row per CI run. Consumed by the dashboard at docs/index.html on main." >> README.md
              touch metrics/history.jsonl
              git add README.md metrics/history.jsonl
              git -c user.email="ci@videoscan" -c user.name="VideoScan CI" \
                commit -m "Bootstrap metrics branch [skip ci]"
              git push -u origin metrics
              cd ..
            }

          cd metrics-repo
          mkdir -p metrics
          echo "$ROW" >> metrics/history.jsonl

          git -c user.email="ci@videoscan" -c user.name="VideoScan CI" \
              add metrics/history.jsonl
          git -c user.email="ci@videoscan" -c user.name="VideoScan CI" \
              commit -m "metrics: ${GITHUB_SHA:0:8} on ${GITHUB_REF_NAME} [skip ci]"

          # Retry once on push race (another CI run may have just pushed).
          git push origin metrics || {
              echo "push failed — pulling and retrying once"
              git pull --rebase origin metrics
              git push origin metrics
          }
